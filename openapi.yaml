            description: 返回当前登录学生的阳光长跑有效次数、里程、速度等成绩概览
            operationId: SubscriptionService_SunrunOverview
            security:
                - BearerAuth: []
            parameters:
                - name: X-Staff-Id
                  in: header
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SunrunOverviewResponseBody'
            x-hduhelp-http: {'auth': 'bearer'}
    /hduhelp-neo/subscriptions:
        get:
            tags:
                - SubscriptionService
            summary: 获取全部提醒渠道订阅状态
            description: 返回 7 个提醒渠道的订阅状态与富元数据(图标/描述/频率/平台/预览图/选项 schema/准入)
            operationId: SubscriptionService_ListSubscriptions
            security:
                - BearerAuth: []
            responses:
                "200":
                    description: Successful response
