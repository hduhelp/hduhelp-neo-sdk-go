                - IdentityService
            summary: 主动发起账号合并/关联
            description: 当前会话用户 A 主动开启一次以合并为目的的第三方登录，返回授权 URL。A 在第三方证明对另一账号 B 的控制后回到 /login/callback，若解析到不同账号 B 即签发一次性 merge_token（target=A，source=B），随后走 preview/confirm。安全模型不变：仅原生会话可发起，target 恒为当前会话用户。
            operationId: IdentityService_MergeStart
            security:
                - NativeSessionAuth: []
            requestBody:
                description: |-
                    ---- MergeStart: 主动发起“合并/关联其他账号”（authSessionUser） ----
                    当前会话用户 A 主动开启一次以合并为目的的第三方登录（如 CAS）。返回第三方授权
                    URL；A 在第三方证明对账号 B 的控制后回到 /login/callback，若解析到另一账号 B，即
