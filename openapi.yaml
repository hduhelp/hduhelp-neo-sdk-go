            security:
                - NativeSessionAuth: []
            requestBody:
                description: |-
                    ==== 多身份体系 E §7: 账号合并（安全关键：需同时证明 A、B 的控制权） ====
                    ---- MergePreview: 预览合并（authSessionUser，token 的 target 必须为当前会话用户） ----
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/MergePreviewRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
