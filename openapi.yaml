                    format: int32
                - name: end
                  in: query
                  description: 结束序号(默认 20)
                  schema:
                    type: integer
                    format: int32
                - name: X-Staff-Id
                  in: header
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SunrunDetailResponseBody'
            x-hduhelp-http: {'auth': 'bearer'}
    /hduhelp-neo/subscription/sunrun/group:
        get:
            tags:
                - SubscriptionService
            summary: 阳光长跑达标要求
            description: 返回当前登录学生所在分组的阳光长跑达标次数、速度与里程要求
            operationId: SubscriptionService_SunrunGroup
            security:
                - BearerAuth: []
            parameters:
                - name: X-Staff-Id
                  in: header
