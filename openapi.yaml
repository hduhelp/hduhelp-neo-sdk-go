    /hduhelp-neo/admin/apps:
        get:
            tags:
                - AdminService
            summary: OAuth应用列表/详情
            description: 不带 id 时返回所有已注册的OAuth应用（items）；带 id 时返回该应用的详情（app）：所属租户、应用权限、用户权限、回调白名单与状态
            operationId: AdminService_ListApps
            security:
                - OperatorBearerAuth: []
            parameters:
                - name: id
                  in: query
                  description: 传入时定位单个应用，返回其详情
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppListResponseBody'
        put:
            tags:
                - AdminService
            summary: 编辑OAuth应用
            description: 编辑应用名称/描述/回调白名单(redirect_uris)/状态；回调地址即授权码流程精确匹配的白名单，服务端校验为绝对 http(s) 地址
            operationId: AdminService_UpdateApp
            security:
                - OperatorBearerAuth: []
            parameters:
                - name: id
                  in: query
                  schema:
                    type: string
            requestBody:
                description: |-
                    编辑应用可变元数据：名称、描述、回调白名单（授权码流程精确匹配的 redirect_uris）、状态。
                    body 字段均可选，缺省表示保持不变。
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateAppRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UpdateAppResponseBody'
        post:
            tags:
                - AdminService
            summary: 创建OAuth应用
            description: 创建应用并可分别配置 application_scopes（TAT/App+X-Staff-Id）和 user_scopes（UAT+用户同意）；返回 app_id 与一次性明文 app_secret（仅此刻可见，不再回显）
            operationId: AdminService_CreateApp
            security:
                - OperatorBearerAuth: []
            requestBody:
                description: 在某租户下创建应用；返回一次性明文 secret（仅此刻可见）。
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateAppRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateAppResponseBody'
        patch:
            tags:
                - AdminService
            summary: 启用/停用OAuth应用
            description: enabled=false 停用指定OAuth应用；enabled=true 重新启用
            operationId: AdminService_SetAppEnabled
            security:
                - OperatorBearerAuth: []
            parameters:
                - name: id
                  in: query
                  schema:
                    type: string
            requestBody:
                description: 启用/停用 OAuth 应用：资源定位走 query，状态切换走 body。
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SetAppEnabledRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SetAppEnabledResponseBody'
    /hduhelp-neo/admin/apps/permissions:
        put:
            tags:
                - AdminService
            summary: 设置应用权限和用户权限
            description: application_scopes 决定 TAT/App 携带 X-Staff-Id 的直接访问；user_scopes 限制 UAT 可请求且用户可同意的权限。两者均实时生效，无需重发令牌。
            operationId: AdminService_SetAppPermissions
            security:
                - OperatorBearerAuth: []
            parameters:
                - name: id
                  in: query
                  schema:
                    type: string
            requestBody:
                description: |-
                    设置应用权限与用户权限。应用权限仅对 TAT/App + X-Staff-Id 生效；用户权限
                    仅对 UAT 生效，并仍需经过用户授权同意。两套权限均实时读取、即时生效。
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SetAppPermissionsRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SetAppPermissionsResponseBody'
