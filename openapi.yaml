                - IdentityService
            summary: 授权码（用户同意）
            description: 已登录用户同意授权某应用后返回一次性授权码 code，用于换取 user_access_token。scope 为逗号分隔的用户权限子集。
            operationId: IdentityService_AuthenAuthorize
            security: []
            parameters:
                - name: app_id
                  in: query
                  schema:
                    type: string
                - name: redirect_uri
                  in: query
                  schema:
                    type: string
                - name: scope
                  in: query
                  description: 逗号分隔，用户权限范围子集
                  schema:
                    type: string
                - name: state
                  in: query
                  schema:
                    type: string
                - name: response_type
                  in: query
                  description: 固定 code
                  schema:
                    type: string
                - name: code_challenge
                  in: query
                  description: PKCE 挑战 (RFC 7636)
                  schema:
                    type: string
                - name: code_challenge_method
                  in: query
                  description: S256|plain
                  schema:
                    type: string
                - name: consent
                  in: query
                  description: true=用户已在一方页面明确同意
                  schema:
                    type: boolean
            responses:
                "200":
                    description: Successful response
                    content:
