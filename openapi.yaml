            operationId: IdentityService_AuthenAuthorizeV1
            security: []
            parameters:
                - name: app_id
                  in: query
                  schema:
                    type: string
                - name: redirect_uri
                  in: query
                  schema:
                    type: string
                - name: scope
                  in: query
                  description: 逗号分隔，用户权限范围子集
                  schema:
                    type: string
                - name: state
                  in: query
                  schema:
                    type: string
                - name: response_type
                  in: query
                  description: 固定 code
                  schema:
                    type: string
                - name: code_challenge
                  in: query
                  description: PKCE 挑战 (RFC 7636)
                  schema:
                    type: string
                - name: code_challenge_method
                  in: query
                  description: S256|plain
                  schema:
                    type: string
                - name: consent
                  in: query
                  description: true=用户已在一方页面明确同意
                  schema:
                    type: boolean
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AuthenAuthorizeRespBody'
            x-hduhelp-http: {'auth': 'public_or_native_session'}
    /hduhelp-neo/open-apis/authen/v1/refresh_access_token:
        post:
            tags:
                - IdentityService
            summary: 刷新 user_access_token（v1）
            description: 版本化路径，语义同 /open-apis/authen/refresh_access_token，单次轮换。
            operationId: IdentityService_AuthenRefreshAccessTokenV1
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AuthenRefreshAccessTokenRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AuthenAccessTokenRespBody'
    /hduhelp-neo/open-apis/authen/v1/revoke:
        post:
            tags:
                - IdentityService
            summary: 吊销 user_access_token（v1，RFC 7009）
            description: 版本化路径，语义同 /open-apis/authen/revoke。
            operationId: IdentityService_AuthenRevokeV1
            requestBody:
                description: RFC 7009 令牌吊销：应用用自身凭据吊销某个 UAT / refresh token。幂等。
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AuthenRevokeRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AuthenRevokeRespBody'
    /hduhelp-neo/open-apis/authen/v1/user_info:
        get:
            tags:
                - IdentityService
            summary: 获取用户信息（v1）
            description: 版本化路径，语义同 /open-apis/authen/user_info。
            operationId: IdentityService_AuthenUserInfoV1
            security:
                - UATBearerAuth: []
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AuthenUserInfoRespBody'
            x-hduhelp-http: {'auth': 'uat'}
    /hduhelp-neo/subscription:
        put:
            tags:
                - SubscriptionService
            summary: 更新订阅渠道配置
            description: 更新当前登录用户某渠道的偏好(JSON 字符串，需为对象；空串重置为渠道默认值)
            operationId: SubscriptionService_UpdateSubscription
            security:
                - BearerAuth: []
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateSubscriptionRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SimpleResponseBody'
            x-hduhelp-http: {'auth': 'bearer'}
        post:
            tags:
                - SubscriptionService
            summary: 订阅提醒渠道
            description: 为当前登录用户开启指定提醒渠道(幂等)，并写入渠道默认偏好与订阅流水
            operationId: SubscriptionService_Subscribe
            security:
                - BearerAuth: []
            parameters:
                - name: channel
                  in: query
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SubscribeRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SimpleResponseBody'
            x-hduhelp-http: {'auth': 'bearer'}
        delete:
            tags:
                - SubscriptionService
            summary: 退订提醒渠道
            description: 为当前登录用户关闭指定提醒渠道，并写入退订流水
            operationId: SubscriptionService_Unsubscribe
            security:
                - BearerAuth: []
            parameters:
                - name: channel
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SimpleResponseBody'
            x-hduhelp-http: {'auth': 'bearer'}
