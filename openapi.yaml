                    type: string
                attachment:
                    type: string
                    description: 图片/文件切片的可渲染链接
                mine:
                    type: boolean
                    description: true=我方补充(可编辑) / false=方舟自动(只读)
            description: |-
                ============================================================================
                管理端：切片管理（file 形态文档：方舟自动切片只读 + 我方补充切片可增删改）
                ============================================================================
        KnowledgeContentVersion:
            type: object
            properties:
                id:
                    type: string
