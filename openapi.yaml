    /hduhelp-neo/open-apis/auth/app-access-token/internal:
        post:
            tags:
                - IdentityService
            summary: 获取 app_access_token
            description: 应用用 app_id + app_secret 换取应用自身身份令牌 app_access_token（短时，约 7200 秒）。令牌只绑定 {app_id, tenant_key}，有效应用权限实时读取。
            operationId: IdentityService_AppAccessTokenInternal
            requestBody:
                description: |-
                    ============================================================
                    三令牌（应用）：app_access_token / tenant_access_token /
                    user_access_token。app_id + app_secret 直接换 app/tenant 令牌（无 app_ticket/ISV）；
                    app/tenant 令牌短时存 Redis，值只含 {app_id, tenant_key}，应用权限从
                    apps.application_scopes 实时解析。授权码流程换 user_access_token，其有效权限为
                    用户同意快照 ∩ apps.user_scopes。
                    ============================================================
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AppAccessTokenInternalRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppAccessTokenInternalResponseBody'
