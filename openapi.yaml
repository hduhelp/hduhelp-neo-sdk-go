components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
        NativeSessionAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
        OperatorBearerAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
        PATBearerAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
        UATBearerAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
    schemas:
        AcademicConfigData:
            type: object
            properties:
                terms:
                    type: array
                    items:
                        $ref: '#/components/schemas/AcademicTermItem'
                    description: 学期学年表（按运营配置的顺序）
                courseQuery:
                    type: array
                    items:
                        $ref: '#/components/schemas/AcademicYearTerm'
                    description: 课程查询筛选项（启用项，保序）
