                        application/json:
                            schema:
                                $ref: '#/components/schemas/SubscriptionsResponseBody'
            x-hduhelp-http: {'auth': 'bearer'}
    /hduhelp-neo/upload:
        post:
            tags:
                - UploadService
            summary: 上传文件
            description: multipart 表单字段 file(兼容 content);返回 url/key/size/contentType。需用户身份(session 或 UAT), 第三方需 upload:file:write。
            operationId: UploadService_Upload
            security:
                - BearerAuth: []
            parameters:
                - name: usage
                  in: query
                  description: 可选业务分组(仅记录/审计)
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UploadResponseBody'
            x-hduhelp-cli: {'request_content_type': 'multipart/form-data', 'file_field': 'file', 'auth': 'bearer'}
    /hduhelp-neo/upload/{key}:
        get:
            tags:
                - UploadService
            summary: 获取已上传文件
            description: 按对象 key 返回原始字节(公开可读)。
            operationId: UploadService_Download
            parameters:
                - name: key
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
            x-hduhelp-cli: {'response_content_type': 'application/octet-stream'}
    /healthz:
        get:
            tags:
                - HealthService
            operationId: HealthService_Healthz
            responses:
                "200":
                    description: HealthResponse is returned by the liveness probe.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HealthResponseBody'
components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
        NativeSessionAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
        OperatorBearerAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
        UATBearerAuth:
            type: http
            scheme: bearer
            bearerFormat: opaque
    schemas:
        AcademicConfigData:
            type: object
            properties:
                terms:
                    type: array
                    items:
                        $ref: '#/components/schemas/AcademicTermItem'
                    description: 学期学年表（按运营配置的顺序）
                courseQuery:
                    type: array
                    items:
                        $ref: '#/components/schemas/AcademicYearTerm'
                    description: 课程查询筛选项（启用项，保序）
                schedule:
                    type: array
                    items:
                        $ref: '#/components/schemas/AcademicYearTerm'
                    description: 课表筛选项（启用项，保序）
                courseQueryDefault:
                    $ref: '#/components/schemas/AcademicYearTerm'
                scheduleDefault:
                    $ref: '#/components/schemas/AcademicYearTerm'
                exam:
                    type: array
                    items:
                        $ref: '#/components/schemas/AcademicYearTerm'
                    description: 考试筛选项（启用项，保序）
                score:
                    type: array
                    items:
                        $ref: '#/components/schemas/AcademicYearTerm'
                    description: 成绩筛选项（启用项，保序）
                examDefault:
                    $ref: '#/components/schemas/AcademicYearTerm'
                scoreDefault:
                    $ref: '#/components/schemas/AcademicYearTerm'
        AcademicConfigResponseBody:
            type: object
            properties:
                data:
                    $ref: '#/components/schemas/AcademicConfigData'
                code:
                    type: integer
                    format: int64
                msg:
                    type: string
        AcademicTermItem:
            type: object
            properties:
                schoolYear:
                    type: string
                    description: 学年全称，如 2025-2026（对齐 SemesterInfo.schoolYear）
                semester:
                    type: string
                    description: 学期号 "1"/"2"/"3"（对齐 SemesterInfo.semester，字符串）
                name:
                    type: string
                    description: 中文显示名，如 2025-2026学年秋季学期
            description: |-
                ==================== 学年学期配置（公开，无需学号，与 Oracle 无关） ====================
                由后台系统配置 academic.terms 驱动，前端统一读取此端点获取：可用学年学期表，以及
                课程查询/课表/考试/成绩各自的筛选项与默认值。纯 App 配置（读自 Postgres 系统配置），教务 Oracle 不可用时仍可用。
        AcademicYearTerm:
            type: object
            properties:
                schoolYear:
                    type: string
                semester:
                    type: string
                    description: 学期号 "1"/"2"/"3"（对齐 SchoolTime/SemesterInfo）
        AdminAppDetail:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                clientId:
                    type: string
                status:
                    type: integer
                    format: int32
