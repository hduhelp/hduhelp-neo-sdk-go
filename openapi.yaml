                    user_access_token。app_id + app_secret 直接换 app/tenant 令牌（无 app_ticket/ISV）；
                    app/tenant 令牌短时存 Redis，值只含 {app_id, tenant_key}，应用权限从
                    apps.application_scopes 实时解析。授权码流程换 user_access_token，其有效权限为
                    用户同意快照 ∩ apps.user_scopes。
                    ============================================================
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AppAccessTokenInternalRequestBody'
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppAccessTokenInternalResponseBody'
