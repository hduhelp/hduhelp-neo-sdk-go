                    type: integer
                    format: int64
                seq:
                    type: integer
                    description: 条目内顺序
                    format: int32
            description: |-
                KnowledgeCarrier 是 item 下一个可独立索引/编辑的内容载体（= 一个方舟 doc）。方舟对账态
                (syncStatus/syncError/arkDocId/syncedAt) 来自其 projection。
        KnowledgeChunk:
            type: object
            properties:
                pointId:
                    type: string
                chunkType:
                    type: string
                    description: text | image | table
                title:
                    type: string
