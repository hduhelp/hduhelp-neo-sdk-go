                    type: string
                    description: JSON 字符串(正文/FAQ 结构)
                editorId:
                    type: string
                note:
                    type: string
                createdAt:
                    type: integer
                    format: int64
            description: |-
                KnowledgeContentVersion 是一个 append-only 内容版本快照。是否 live/draft 只由 carrier
                上的指针决定；version_no=0 为原始版。
