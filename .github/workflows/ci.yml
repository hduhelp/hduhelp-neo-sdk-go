name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, vet, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  generate:
    name: Generated client is fresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - name: Install oapi-codegen (pinned)
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.7.2
      - name: Regenerate the SDK from openapi.yaml
        run: make generate
      - name: Fail if the committed generated code is stale
        run: |
          if ! git diff --exit-code -- models service client.gen.go; then
            echo "::error::Generated code is out of date. Run 'make generate' and commit the result." >&2
            exit 1
          fi
