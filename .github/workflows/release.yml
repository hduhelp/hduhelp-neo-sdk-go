name: Release

# The Go module is published purely by tagging. Bump `version:` in release.yaml
# and push to main: this workflow reads that value and, if the tag v<version>
# does not exist yet, creates and pushes it. Consumers then use
# `go get github.com/hduhelp-neo/hduhelp-neo-sdk-go@v<version>`.
#
# We deliberately do NOT trigger on tag pushes: the version file is the single
# source of truth and the workflow is what creates the tag.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    name: Tag release from version file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: parse
        run: |
          version=$(grep '^version:' release.yaml | awk '{print $2}')
          if [ -z "${version}" ]; then
            echo "release.yaml must contain 'version: <major.minor.patch>'" >&2
            exit 1
          fi
          if ! echo "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version '${version}'. Expected major.minor.patch, e.g. 0.1.0." >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if absent
        run: |
          tag="${{ steps.parse.outputs.tag }}"
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists; nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
          echo "Created and pushed ${tag}."
